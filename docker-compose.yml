version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: rrrs_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rrrs_db
    ports:
      - "3307:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  db_mongo:
    image: mongo:latest
    container_name: rrrs_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DB=rrrs_db
      - MONGO_URI=mongodb://mongo_db:27017/rrrs_reviews
    depends_on:
      - mysql
      - db_mongo

  frontend:
      image: node:20
      container_name: rrrs_frontend
      working_dir: /app
      volumes:
        - ./frontend:/app
        - /app/node_modules
      command: sh -c "npm install && npm run dev -- --host" 
      ports:
        - "5173:5173"
      depends_on:
        - backend

volumes:
  mysql_data:
  mongo_data: